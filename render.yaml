services:
  - type: web
    name: trinamix-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./workbench.db
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@trinamix.com
      - key: ADMIN_PASSWORD
        value: admin123
      - key: ADMIN_NAME
        value: Trinamix Admin
      - key: AI_PROVIDER
        value: none
      - key: FRONTEND_ORIGIN
        value: https://trinamix-frontend.onrender.com

  - type: static
    name: trinamix-frontend
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://trinamix-backend.onrender.com/api